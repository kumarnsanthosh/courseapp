<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="/static/css/base.css">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    {% load static %}
    <nav class="fixed  w-full flex justify-between  shadow-lg gap-5 flex lg:mx-auto ">
        
        <!-- mobile view -->
        
        <div class="w-full  lg:hidden flex    justify-between bg-blue-300">
            <button class="lg:hidden hover:bg-green-200">
                <svg xmlns="http://www.w3.org/2000/svg"
                    class="w-8 h-8"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor">

                    <path stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
            <a href="#" class="text-3xl text-shadow-lg text-center font-bold tracking-wider font-sans">
                SkillGRID
            </a>
            <a href="">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-7">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
                </svg>
            </a>
            <a href="">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                </svg>
            </a>
        </div>
        
        <!-- Desktop view -->
        <div class="bg-blue-300">
            <div class="flex w-full mt-3  md:gap-6 bg-red-300 ml-5 ">
                <div class="flex flex-row gap-6 mt-4">
                    <a href="#" class="lg:block hidden lg:text-5xl text-shadow-lg text-center font-bold tracking-wider font-sans">
                        SkillGRID
                    </a>
                    <a href="#" class="lg:text-xl hidden lg:block lg:font-light mt-3">
                        Explore
                    </a>
                </div>
                <div class="relative  flex flex-1 h-10 hidden  lg:block lg:mx-auto  ">
                    <form action="" class="w-full">
                        <svg class="absolute text-xl mt-1 w-8 h-8 left-3 top-1/2 text-gray-400"
                            xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor">

                        <path stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M21 21l-4.35-4.35m1.6-5.65
                            a7 7 0 11-14 0
                            7 7 0 0114 0z"/>
                        </svg>
                        <input
                            type="text"
                            placeholder="Search for anything..."
                            class="lg:w-full  mt-1 md:h-9 p-9 text-2xl  lg:pl-13 border rounded-full focus:outline-none focus:ring-2 focus:ring-blue-40"/>
                    </form>               
                </div>
                <div class="gap-7 lg:block mt-6 hidden  lg:flex  end-0">
                    <a href="" class="text-xl font-light ">SkillGRID Business</a>
                    <a href="" class="text-xl font-light ">Instructor</a>
                    <a href="" class="text-xl font-light ">My learning</a>
                    <a href="">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-7">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" />
                        </svg>
                    </a>
                    <a href="">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-7">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
                            </svg>
                    </a>
                    <a href="" class="">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-7">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
                        </svg>
                    </a>
                </div>
                <div class="mr-8 mt-5 hidden lg:block">
                    <a href="" class="">
                        <img height="55" width="55" src="{% static 'images/user-image.png' %}" alt="">
                    </a>   
                </div>
                <div class="devide-y-4">
                </div>
            </div>    
        </div>
    </nav>
    {% block body %}
    {% endblock %}
    <footer>

    </footer>
</body>
</html>
