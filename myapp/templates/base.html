{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'images/apple-touch-icon.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'images/favicon-16x16.png' %}">
    <link rel="manifest" href="images/site.webmanifest">
    <title>SkillGrid</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <nav class="fixed  w-full flex shadow-lg gap-5 lg:mx-auto">

        <!-- mobile view -->
        <div class="w-full mt-5 mb-5 flex items-center justify-between xl:hidden ">
            <div class="flex ml-4">
                <button class=" hover:bg-green-200">
                    <svg xmlns="http://www.w3.org/2000/svg"
                        class="w-8 h-8"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor">

                        <path stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
            </div>
            <div>
                <a href="#" class="flex gap3">
                    <img height="30px" width="30px" src="{% static 'images/icon_bulb.png' %}" alt="">
                    <p class="text-3xl text-shadow-lg  text-center font-bold tracking-wider font-sans">SkillGRID</p>
                </a>
            </div>
            <div class="flex gap-6">
                <a href="">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                    </svg>
                </a>
                <a href="" class="mr-6">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-7">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
                    </svg>
                </a>
            </div>
        </div>
        
            <!-- Desktop view -->
        <div class="flex w-full flex-col xl:block hidden">
            <div class="flex w-full mt-3  md:gap-6 ml-5 ">
                <div class="flex flex-row gap-6 mt-4">

                    <a href="#" class="flex">
                        <img height="50px" width="50px" src="{% static 'images/icon_bulb.png' %}" alt="" class="mb-3">
                        <p class="lg:text-5xl text-shadow-lg text-center font-bold tracking-wider font-sans">SkillGRID</p>
                    </a>
                    <a href="#" class="lg:text-xl hidden lg:block lg:font-light mt-3">
                        Explore
                    </a>
                </div>
                <div class="relative  flex flex-1 h-10 hidden  lg:block lg:mx-auto  ">
                    <form action="" class="w-full">
                        <svg class="absolute text-xl mt-1 w-8 h-8 left-3 top-1/2 text-gray-400"
                            xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor">

                        <path stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M21 21l-4.35-4.35m1.6-5.65
                            a7 7 0 11-14 0
                            7 7 0 0114 0z"/>
                        </svg>
                        <input
                            type="text"
                            placeholder="Search for anything..."
                            class="lg:w-full shadow-2xl  mt-1 md:h-9 p-9 text-2xl  lg:pl-13 border rounded-full focus:outline-none focus:ring-2 focus:ring-blue-40"/>
                    </form>               
                </div>
                <div class="gap-7 lg:block mt-6 hidden text-xl font-light lg:flex  end-0">
                    <a href="" class="hidden 2xl:block">SkillGRID Business</a>
                    <a href="" class="hidden 2xl:block">Instructor</a>
                    <a href="" class="">My learning</a>
                    <a href="">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-7">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" />
                        </svg>
                    </a>
                    <a href="">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-7">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
                            </svg>
                    </a>
                    <a href="" class="">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-7">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
                        </svg>
                    </a>
                </div>
                <div class="mr-8 mt-4 hidden lg:block">
                    <a href="" class="">
                        <img height="55" width="55" src="{% static 'images/user-image.png' %}" alt="">
                    </a>   
                </div>
            </div>
            
            <div class="flex flex-col  items-center gap-auto lg:mx-auto m-10  lg:flex hidden" >
                <div class="text-xl flex gap-8  font-light ">
                    <a href="" class="">Devoplopment</a>
                    <a href="" class="">Business</a>
                    <a href="">Finance & Accounting</a>
                    <a href="">IT & Software</a>
                    <a href="">office Productivity</a>
                    <a href="">Personal Devolopment</a>
                    <a href="" class="hidden xl:block">Design</a>
                    <a href="" class="hidden xl:block">Marketing</a>
                    <a href="" class="hidden 2xl:block">Health & Fitness</a>
                    <a href="" class="hidden 2xl:block">Music</a>
                </div>
            </div>    
        </div>

    {% block body %}
    {% endblock %}
    <footer>

    </footer>
