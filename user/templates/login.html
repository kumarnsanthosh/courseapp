{% extends 'base.html' %}
{% block body %}
{% load static %}

<div class="min-h-screen flex items-center justify-center bg-gray-50 py-6 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md space-y-8">
 
        <div class="flex flex-col items-center">
            <a href="{% url 'myapp:index' %}" class="flex items-center gap-3 mb-4 hover:opacity-80 transition">
                <img src="{% static 'images/icon_bulb.png' %}" alt="SkillGrid Logo" class="h-8 w-8 sm:h-10 sm:w-10 md:h-12 md:w-12">
                <h1 class="text-2xl sm:text-3xl md:text-4xl font-bold tracking-wide font-sans">
                    Skill<span class="text-indigo-400">Grid</span>
                </h1>
            </a>
            <h2 class="mt-4 text-center text-xl sm:text-2xl font-semibold text-gray-900">Sign in to your account</h2>
        </div>

        <div class="bg-gray-700 rounded-xl shadow-lg p-6 sm:p-8 md:p-10">
            <form method="post" class="space-y-6">
                {% csrf_token %}

           
                <div>
                    <label for="username" class="block text-sm font-medium text-white mb-2">Username</label>
                    <input 
                        type="text" 
                        id="username"
                        name="username" 
                        required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 bg-white text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                        placeholder="Enter your username"
                    >
                </div>

               
                <div>
                    <label for="password" class="block text-sm font-medium text-white mb-2">Password</label>
                    <input 
                        type="password" 
                        id="password"
                        name="password" 
                        required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 bg-white text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                        placeholder="Enter your password"
                    >
                </div>
                <button 
                    type="submit" 
                    class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-indigo-400"
                >
                    Sign In
                </button>
            </form>
        </div>

  
        <div class="text-center space-y-3 text-sm text-gray-600">
            <p>
                Don't have an account? 
                <a href="{% url 'user:register' %}" class="text-indigo-600 hover:text-indigo-700 font-medium">Sign up here</a>
            </p>
        </div>
    </div>
</div>

{% endblock %}
