{% extends 'base.html' %}
{% block body %}
<div class="min-h-screen">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="text-center items-center py-4">
            <h1 class="font-bold text-xl  text-yellow-700">Create Course</h1>
        </div>
        <div class="flex flex-col   justify-between items-center">
            <div class="bg-white flex-col flex gap-6 p-10 rounded-xl">
                <div class="flex items-center  rounded-xl bg-green-100 p-3 justify-between">
                    <label class="block mb-1 text-blue-300 font-bold">Course name:</label>
                    <p class="">{{ form.name }}</p>
                </div>

                <div class="flex items-center shadow-xl rounded-xl bg-green-100 p-3 justify-between">
                    <label class="block mb-1 text-blue-300 font-bold pr-5">Thumbnail:</label>
                    <p class="text-blue-300 shadow-xl bg-white rounded-xl font-bold">{{ form.image }}</p>
                </div>

                <div class="flex items-center shadow-xl rounded-xl bg-green-100 p-3 justify-between">
                    <label class="block mb-1 text-blue-300 font-bold ">Preview:</label>
                    <p class="text-blue-300 bg-white rounded-xl shadow-xl font-bold">{{ form.video }}</p>
                </div>
                
                <div class="flex  rounded-xl bg-green-100 p-3 justify-between">
                    <label class="block mb-1 text-blue-300 font-bold">Category:</label>
                    <p class="">{{ form.category }}</p>
                </div>
                <div class="flex items-center rounded-xl bg-green-100 p-3 justify-between">
                    <label class="block mb-1 text-blue-300 font-bold pr-5">Desription:</label>
                    <p class="">{{ form.description }}</p>
                </div>
                <div class="flex items-center rounded-xl bg-green-100 bg-black p-3 justify-between">
                    <label class="block mb-1 text-blue-300 font-bold">Price:</label>
                    <p class="">{{ form.price }}</p>
                </div>
                <div class="flex items-center rounded-xl bg-green-100 p-3 justify-between">
                    <label class="block mb-1 text-blue-300 font-bold">hours:</label>
                    <p class="">{{ form.hours }}</p>
                </div>
                <div class="flex justify-center ">
                    <button type="submit" class="mt-4 bg-blue-400 cursor-pointer font-bold text-white px-4 py-1 rounded">
                        Save
                    </button>
                </div>
            </div>
        </div>
    </form>
</div>

{% endblock %}
